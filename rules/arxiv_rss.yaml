# ArXiv RSS 爬取规则配置
# 用于爬取 diffusion 和 autoregressive 相关的论文

name: "arxiv"
url: "https://rss.arxiv.org/rss/cs.AI"  # 计算机科学-人工智能分类的 RSS
crawl_type: "rss"
update_frequency: 1440  # 更新频率（分钟），24小时
storage_path: "arxiv"
enabled: true

# 自定义配置
custom_config:
  max_items: 100
  crawl_time: "00:00"
  include_abstract: true
  
  translator:
    enabled: true
    source_lang: "en"
    target_lang: "zh"
  
  # 过滤器链：只保留 diffusion 和 autoregressive 相关论文
  filters:
    # 时间过滤器：爬取24小时内的论文
    - type: "time"
      relative_hours_start: 24
      relative_hours_end: 0
      date_only: false
      description: "时间过滤：爬取24小时内的论文"
    
    # 关键词过滤器：保留 diffusion、autoregressive、image compression 相关
    - type: "or"
      description: "关键词过滤：保留标题或摘要中包含 diffusion、autoregressive 或 image compression 的论文"
      filters:
        - type: "title"
          keywords:
            - "diffusion"
            - "autoregressive"
            - "AR model"
            - "autoregression"
            - "image compression"
            - "image rescaling"
        - type: "summary"
          keywords:
            - "diffusion"
            - "autoregressive"
            - "AR model"
            - "autoregression"
            - "image compression"
            - "image rescaling"
  
  # 分类映射：diffusion、autoregressive、image_compression
  category_mapping:
    diffusion:
      folder: "diffusion"
      filter:
        type: "or"
        filters:
          - type: "title"
            keywords:
              - "diffusion"
          - type: "summary"
            keywords:
              - "diffusion"
    
    autoregressive:
      folder: "autoregressive"
      filter:
        type: "or"
        filters:
          - type: "title"
            keywords:
              - "autoregressive"
              - "AR model"
              - "autoregression"
          - type: "summary"
            keywords:
              - "autoregressive"
              - "AR model"
              - "autoregression"
    
    image_compression:
      folder: "image_compression"
      filter:
        type: "or"
        filters:
          - type: "title"
            keywords:
              - "image compression"
              - "image rescaling"
          - type: "summary"
            keywords:
              - "image compression"
              - "image rescaling"
  
  org_format: "detailed"
  
  exporter:
    class: "ArXivOrgExporter"
    title_template: "* [[{link}][{first_author} --- {title}]]"
    
    path:
      type: "relative"
      base_path: "~/org/roam/articles"
      template: "{base_path}/{site_name}/{date}.org"
    
    index:
      enabled: true
      path: null
      table_headers:
        - "{link}"
        - "{title}"
        - "{first_author}"
      cell_templates:
        link: "[[{link}][查看]]"
        title: "[[{output_path_rel}][{title}]]"
        first_author: "{first_author}"
      header_labels:
        title: "标题"
        first_author: "第一作者"
        link: "链接"
