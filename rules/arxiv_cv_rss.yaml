# ArXiv RSS 爬取规则配置
# 用于爬取 diffusion / autoregressive / image compression / visual tokenizer 相关论文

name: "arxiv-cv"
url: "https://rss.arxiv.org/rss/cs.CV"
crawl_type: "rss"
update_frequency: 1440
storage_path: "daily-papers"
enabled: true

custom_config:
  max_items: 150
  crawl_time: "00:00"
  include_abstract: true
  auto_digest: true

  translator:
    enabled: true
    source_lang: "en"
    target_lang: "zh"

  filters:
    - type: "time"
      relative_hours_start: 24
      relative_hours_end: 0
      date_only: false
      description: "时间过滤：爬取24小时内的论文"
    - type: "and"
      description: "关键词过滤：保留 diffusion、autoregressive、image compression、1D visual tokenizer 或 diffusion visual encoder 相关论文，排除 weather 相关"
      filters:
        - type: "or"
          filters:
            - type: "title"
              keywords: &keywords
                - "diffusion"
                - "autoregressive"
                - "AR model"
                - "autoregression"
                - "image compression"
                - "image rescaling"
                - "1D visual tokenizer"
                - "1-D visual tokenizer"
                - "visual tokenizer"
                - "sequential visual encoding"
                - "1D patch tokenization"
                - "diffusion tokenizer"
                - "diffusion image encoder"
                - "diffusion visual encoder"
                - "continuous visual tokenizer"
            - type: "summary"
              keywords: *keywords
        - type: "not"
          filter:
            type: "or"
            filters:
              - type: "title"
                keywords: ["weather", "forecasting", "meteorology", "precipitation", "rainfall"]
              - type: "summary"
                keywords: ["weather", "forecasting", "meteorology", "precipitation", "rainfall"]

  category_mapping:
    diffusion:
      folder: "diffusion"
      filter:
        type: "or"
        filters:
          - type: "title"
            keywords: ["diffusion"]
          - type: "summary"
            keywords: ["diffusion"]
    autoregressive:
      folder: "autoregressive"
      filter:
        type: "or"
        filters:
          - type: "title"
            keywords: ["autoregressive", "AR model", "autoregression"]
          - type: "summary"
            keywords: ["autoregressive", "AR model", "autoregression"]
    image_compression:
      folder: "image_compression"
      filter:
        type: "or"
        filters:
          - type: "title"
            keywords: ["image compression", "image rescaling"]
          - type: "summary"
            keywords: ["image compression", "image rescaling"]
    visual_tokenizer_1d:
      folder: "visual_tokenizer_1d"
      filter:
        type: "or"
        filters:
          - type: "title"
            keywords: ["1D visual tokenizer", "1-D visual tokenizer", "sequential visual encoding", "1D patch tokenization"]
          - type: "summary"
            keywords: ["1D visual tokenizer", "1-D visual tokenizer", "sequential visual encoding", "1D patch tokenization"]
    diffusion_visual_encoder:
      folder: "diffusion_visual_encoder"
      filter:
        type: "or"
        filters:
          - type: "title"
            keywords: ["diffusion tokenizer", "diffusion image encoder", "diffusion visual encoder", "continuous visual tokenizer"]
          - type: "summary"
            keywords: ["diffusion tokenizer", "diffusion image encoder", "diffusion visual encoder", "continuous visual tokenizer"]

  org_format: "detailed"
  exporter:
    class: "ArXivOrgExporter"
    title_template: "## [{first_author} --- {title}]({link})"
    path:
      type: "relative"
      base_path: "~/gongshangzheng.github.io/data/daily-papers"
      template: "{base_path}/{date}.json"
    index:
      enabled: false
      path: null
