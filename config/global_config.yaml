storage:
  base_path: "~/gongshangzheng.github.io/data/daily-papers"
  date_format: "%Y-%m-%d"
  output_format: "html-blog"
logging:
  level: "INFO"
  file: "logs/crawler.log"
  max_size_mb: 10
scheduler:
  check_interval: 60
  max_workers: 5
  default_update_frequency: 120
filters:
  - type: "title"
    keywords: ["LLM", "large language model", "GPT", "LLaMA", "Claude", "language model"]
    negate: true
  - type: "summary"
    keywords: ["LLM", "large language model", "GPT", "LLaMA", "Claude", "language model"]
    negate: true
